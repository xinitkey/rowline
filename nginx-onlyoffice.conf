# Nginx configuration for OnlyOffice Document Server behind proxy
# Add this to your existing rowline.me nginx configuration

# OnlyOffice на поддомене (Вариант 1 - рекомендуется)
server {
    listen 80;
    server_name docs.rowline.me;
    
    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Увеличить таймауты для конвертации больших файлов
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }
}

# HTTPS версия (после настройки SSL)
server {
    listen 443 ssl http2;
    server_name docs.rowline.me;
    
    ssl_certificate /etc/letsencrypt/live/docs.rowline.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.rowline.me/privkey.pem;
    
    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }
}

# ===================================================================
# Вариант 2: OnlyOffice на том же домене в подпапке
# Добавить в существующий server блок rowline.me:
# ===================================================================

# В существующем server { ... } для rowline.me добавить:

    location /onlyoffice/ {
        proxy_pass http://localhost:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        
        # Rewrite URLs
        rewrite ^/onlyoffice/(.*)$ /$1 break;
    }

