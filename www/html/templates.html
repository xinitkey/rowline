<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Manager - File Converter</title>
    <script>
        // Prevent flash of wrong theme on page load
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="shortcut icon" href="../img/rowline_logo.png" type="image/x-icon">
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <article>
            <h1>Template Manager</h1>
            <p class="subtitle">Download sample templates to structure your Excel files correctly.</p>

            <form id="templateDownloadForm">
                <div class="upload-container" style="border: none; padding: 3rem;">
                    
                    <label for="templateSelect" style="display: block; margin-bottom: 1rem; color: #555; font-size: 1.1rem;">
                        Select a template to download:
                    </label>
                    
                    <select id="templateSelect" class="template-select" style="margin-top: 0; margin-bottom: 2rem;">
                        <option value="../samples/FD-048BL - template.xlsx">FD-048BL - template.xlsx</option>
                    </select>

                    <button type="submit" class="btn-upload">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: 8px; vertical-align: bottom;">
                            <path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M7 10L12 15L17 10" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 15V3" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Download
                    </button>
                    
                </div>
            </form>

            <section id="messageSection" style="display:none; margin-top: 2rem;">
                <p id="messageText"></p>
            </section>
        </article>
    </main>
    
    <div id="footer-placeholder"></div>
    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.getElementById('templateDownloadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const select = document.getElementById('templateSelect');
            const fileUrl = select.value;
            
            if (fileUrl) {
                // Trigger download
                const link = document.createElement('a');
                link.href = fileUrl;
                link.download = fileUrl.split('/').pop(); // Set filename
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        });
    </script>
</body>

</html>
