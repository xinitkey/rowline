<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Converter</title>
    <script>
        // Prevent flash of wrong theme on page load
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <link rel="stylesheet" href="css/style.css">

    <link rel="icon" type="image/png" href="img/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
    <link rel="shortcut icon" href="img/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png" />
    <link rel="manifest" href="img/site.webmanifest" />
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <article>
            <h1>File Converter</h1>
            <p class="subtitle">Convert женя одуванчик your documents quickly and easily.</p>

            <section id="resultSection" style="display:none;">
                <h2>Conversion Result</h2>
                <a id="downloadLink" href="#" download="converted.xml">Download XML File</a>
            </section>

            <section id="errorSection" style="display:none; color:red;">
                <h2>Error</h2>
                <p id="errorMessage"></p>
            </section>

            <section class="description-container">
                <h2>Description</h2>
                <p>This tool converts XLSX files to XML format. Upload your XLSX file using the "Choose Files" button above, and the converted XML file will be available for download.</p>
            </section>
        </article>
    </main>
    
    <div id="footer-placeholder"></div>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
