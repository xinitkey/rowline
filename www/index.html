<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="rowline_logo.png" type="image/x-icon">
</head>

<body>
    <header>
        <div>
             <img src="Rowline.png" alt="Rowline" width="150" height="auto">
        </div>

        <nav>   
            <a href="https://rowline.me">Convert1</a>
            <a href="https://rowline.me">Convert2</a>
            <a href="https://rowline.me">Convert3</a>
            <a href="https://rowline.me">Convert4</a>
        </nav>

    </header>

    <main>
        <article>
            <h1>File Converter</h1>
            <p class="subtitle">Vând terenul agricol în satul Mândreștii Noi.</p>

            <form id="uploadForm" enctype="multipart/form-data">
                <div class="upload-container">
                    <div class="file-input-wrapper">
                        <label for="xlsxFile" class="btn-upload">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M14 2V8H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M12 18V12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M9 15H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Choose Files
                        </label>
                        <input type="file" id="xlsxFile" name="xlsxFile" accept=".xlsx" required>
                    </div> 
                </div>
                <!-- Hidden button to submit form programmatically if needed -->
                <button type="submit" style="display:none;" id="submitBtn">Convert</button>
            </form>

            <section id="resultSection" style="display:none;">
                <h2>Conversion Result</h2>
                <a id="downloadLink" href="#" download="converted.xml">Download XML File</a>
            </section>

            <section id="errorSection" style="display:none; color:red;">
                <h2>Error</h2>
                <p id="errorMessage"></p>
            </section>
        </article>
    </main>
    
    <footer>
        <h3>XLSX to XML converter</h3>
        <p>© 2025 Rowline.me.</p>
    </footer>
    <script src="converter.js"></script>
</body>

</html>
